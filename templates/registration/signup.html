{% extends 'base.html' %}

{% block title %}Sign Up - ProManage{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header text-center py-4">
                    <h4 class="mb-0"><i class="bi bi-kanban"></i> Create Account</h4>
                    <p class="text-muted mb-0">Join ProManage today</p>
                </div>
                <div class="card-body p-4">
                    <form method="post" action="{% url 'signup' %}">
                        {% csrf_token %}
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="id_first_name" class="form-label">First Name</label>
                                <input type="text" name="first_name" id="id_first_name" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="id_last_name" class="form-label">Last Name</label>
                                <input type="text" name="last_name" id="id_last_name" class="form-control">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="id_username" class="form-label">Username</label>
                            <input type="text" name="username" id="id_username" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="id_email" class="form-label">Email Address</label>
                            <input type="email" name="email" id="id_email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="id_password" class="form-label">Password</label>
                            <input type="password" name="password" id="id_password" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="id_password_confirm" class="form-label">Confirm Password</label>
                            <input type="password" name="password_confirm" id="id_password_confirm" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="id_bio" class="form-label">Bio (Optional)</label>
                            <textarea name="bio" id="id_bio" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center py-3">
                    <p class="mb-0">Already have an account? <a href="{% url 'login' %}">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
